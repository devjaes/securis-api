services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: security-project-sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "StrongPassword@123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      # Cambiar a volúmenes nombrados sin especificar rutas locales
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "StrongPassword@123" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  sqlserver_data:
    driver: local

networks:
  app-network:
    driver: bridge